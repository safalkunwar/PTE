# Build the client and deploy to GitHub Pages (static front-end only).
# Enable in repo: Settings → Pages → Source: GitHub Actions.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client for GitHub Pages
        run: pnpm run build:pages
        env:
          VITE_OAUTH_PORTAL_URL: https://example.com
          VITE_APP_ID: pages-demo
          # Project site: https://<owner>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: SPA fallback for client-side routes
        run: cp dist/public/index.html dist/public/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    environment: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
